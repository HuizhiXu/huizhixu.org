<section class="home-hero">
  <div class="home-hero-shell container max-w-6xl mx-auto px-6 py-8 lg:py-10">
    <div class="home-hero-card grid md:grid-cols-[1fr_400px] gap-6 lg:gap-10 items-center">
      <div>
        <div class="home-eyebrow">{{ i18n "homeHeroEyebrow" }}</div>
        <h1 class="text-3xl lg:text-4xl font-bold mb-4 leading-tight">{{ .Site.Params.introTitle | safeHTML}}</h1>
        <p class="text-gray-600 dark:text-gray-300 text-base lg:text-lg leading-relaxed max-w-2xl">{{ .Site.Params.introSubtitle | safeHTML}}</p>
        <div class="flex flex-wrap gap-2 mt-5">
          <span class="home-pill">{{ i18n "homePillEngineering" }}</span>
          <span class="home-pill">{{ i18n "homePillAI" }}</span>
          <span class="home-pill">{{ i18n "homePillReading" }}</span>
          <span class="home-pill">{{ i18n "homePillLife" }}</span>
        </div>
      </div>
      <div class="home-photo-frame">
        <img class="home-photo" src="{{ .Site.Params.introPhoto }}" alt="{{ .Site.Title }}" />
      </div>
    </div>
  </div>
</section>
